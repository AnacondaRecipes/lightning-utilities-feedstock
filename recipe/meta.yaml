{% set name = "lightning-utilities" %}
{% set version = "0.15.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-','_') }}-{{ version }}.tar.gz
  sha256: cdf12f530214a63dacefd713f180d1ecf5d165338101617b4742e8f22c032e24

build:
  number: 0
  skip: true  # [py<38]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - importlib-metadata >=4.0.0  # [py<38]
    - packaging >=17.1
    - typing_extensions
    - setuptools
  run_constrained:
    - jsonargparse >=4.38.0
    - mypy >=1.0.0

test:
  imports:
    - lightning_utilities
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/Lightning-AI/utilities
  summary: PyTorch Lightning Sample project.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  description: |
    Common Python utilities and GitHub Actions in Lightning Ecosystem.
  dev_url: https://github.com/Lightning-AI/utilities
  doc_url: https://github.com/Lightning-AI/utilities

extra:
  recipe-maintainers:
    - Borda
    - carmocca
    - Tobias-Fischer
  skip-lints:
    - python_build_tool_in_run
